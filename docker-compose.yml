services:
  runlog:
    build: .
    container_name: runlog
    ports:
      - "8000:8000"
    environment:
      - STRAVA_CLIENT_ID=${STRAVA_CLIENT_ID}
      - STRAVA_CLIENT_SECRET=${STRAVA_CLIENT_SECRET}
      - STRAVA_REDIRECT_URI=${STRAVA_REDIRECT_URI:-http://localhost:8000/auth/strava/callback}
      - SYNC_INTERVAL_HOURS=${SYNC_INTERVAL_HOURS:-6}
      - SYNC_ACTIVITY_LIMIT=${SYNC_ACTIVITY_LIMIT:-10}
      - GARMIN_EMAIL=${GARMIN_EMAIL:-}
      - GARMIN_PASSWORD=${GARMIN_PASSWORD:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - GARMIN_DETAIL_BATCH_SIZE=${GARMIN_DETAIL_BATCH_SIZE:-5}
      - GARMIN_BATCH_PAUSE_SEC=${GARMIN_BATCH_PAUSE_SEC:-300}
      - GARMIN_COOLDOWN_BASE_SEC=${GARMIN_COOLDOWN_BASE_SEC:-300}
      - GARMIN_COOLDOWN_MAX_SEC=${GARMIN_COOLDOWN_MAX_SEC:-14400}
      - GARMIN_STEPS_VOLATILE_DAYS=${GARMIN_STEPS_VOLATILE_DAYS:-2}
      - DB_PATH=/data/runlog.db
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - runlog_data:/data
    restart: unless-stopped

volumes:
  runlog_data:
